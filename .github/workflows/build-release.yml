name: Build Debian 13 UEFI Qcow2 Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x build.sh

      - name: Run Build Script (with debug output)
        run: |
          # 使用 script 命令保留完整输出，避免一些 tty 问题
          script -e -c "sudo ./build.sh" /dev/null

      - name: List generated files
        run: ls -lh *.qcow2

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Debian 13 UEFI Qcow2 Minimal"
          body: |
            ### 极致精简版 QCOW2 镜像 (UEFI 启动)
            - **OS**: Debian 13 (Trixie) Cloud-Kernel
            - **格式**: qcow2 (内置 zlib 压缩)
            - **文件系统**: Btrfs (zstd:3)
            - **密码**: `password`
            - **启动方式**: UEFI (已安装 GRUB-EFI)
          files: debian-uefi.qcow2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
