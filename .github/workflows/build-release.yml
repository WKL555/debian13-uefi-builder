name: Build and Release Debian 13 UEFI Image

# 触发条件：手动触发 (也可以改成 push 触发)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须具有写入权限以创建 Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make Build Script Executable
        run: chmod +x build.sh

      - name: Run Build Script (Requires Root)
        run: sudo ./build.sh

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: "Debian 13 UEFI Minimal Image (${{ env.release_tag }})"
          body: |
            ### Debian 13 (Trixie) Minimal x86_64
            - **Boot Method**: UEFI (GPT + ESP)
            - **Disk Size**: 1GB (Auto-expands on some reinstall scripts)
            - **Root Password**: `password`
            - **Network**: DHCP enabled (eth0, ens3, enp3s0)
          files: debian13-uefi-1g.raw.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
